  "/>

  <!-- negative cuts for refined geometry -->
  <path fill="#070B16" d="
    M 404 480
    L 796 480
    L 772 512
    L 628 512
    L 628 850
    L 600 874
    L 572 850
    L 572 512
    L 428 512
    Z
  "/>

  <!-- rebuild central stem in ivory -->
  <path class="mark" d="
    M 572 512
    L 628 512
    L 628 842
    L 600 868
    L 572 842
