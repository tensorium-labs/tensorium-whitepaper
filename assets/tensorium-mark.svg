      .bg { fill: #05070D; }
      .ring { fill: #070B16; stroke: #F1EDE4; stroke-width: 28; }
      .mark { fill: #F1EDE4; }
      .accent { stroke: #4C88FF; stroke-width: 10; stroke-linecap: round; fill: none; }
    </style>
  </defs>

  <rect width="1200" height="1200" rx="260" class="bg"/>
  <circle cx="600" cy="600" r="430" class="ring"/>

  <!-- top hash pillars -->
  <rect x="538" y="282" width="28" height="72" rx="4" class="mark"/>
  <rect x="634" y="282" width="28" height="72" rx="4" class="mark"/>

  <!-- primary T monogram -->
  <path class="mark" d="
